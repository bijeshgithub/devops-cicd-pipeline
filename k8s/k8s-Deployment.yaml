apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-cicd-deployment
  labels:
    app: devops-cicd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-cicd
  template:
    metadata:
      labels:
        app: devops-cicd
    spec:
      containers:
      - name: devops-cicd-container
        image: kashyapdockerhub/devops-cicd-pipeline:latest
        ports:
        - containerPort: 80
